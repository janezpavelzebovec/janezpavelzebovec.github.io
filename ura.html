        <style>
            body {
              background: #121212;
              display: flex;
              justify-content: center; /*poravnamo v sredino vodoravno*/
              align-items: center; /*poravnamo v sredino navpično v polju dnevnaura*/
              min-height: 100vh; /*polje dnevnaura naj bo visoko za višino zaslona, zato da bo lahko align-items poravnano na sredino zaslona*/
              overflow: hidden; /*skrijemo drsnik, oziroma kar presega mejo*/
              color: White;
              box-sizing: border-box;
            }

            .astronomskaura {
              width: 100vmin;
              height: 100vmin;
              background-color: none;
              border: 1.5px none;
              display: flex;
              position: relative; /*nadrejen položaj glede na */
              border-radius: 50%;
              z-index: 50;
            }
            .sonce {
                width: 10vmin;
                height: 10vmin;
                border-radius: 50%;
                border: 1.5px solid White;
                background-color: White;
                z-index: 20;
                position: absolute;
                top: 45vmin;
                left: 45vmin;
            }
            .prestopnoleto {
              border: none;
              width: 100vmin;
              height: 100vmin;
              border-radius: 50%;
              position: absolute;
              z-index: 0;
              transform-origin: center;
              --zamik: calc(-1 * (0.2425 * 360 / 365.2425)deg);
              transform: rotate(var(--zamik));
            }
            .navadnoleto {
              border: 1.5px solid White;
              width: 95vmin;
              height: 95vmin;
              border-radius: 50%;
              position: absolute;
              bottom: 2.5vmin;
              left:2.5vmin;
            }

            .dnevnaura {
              --rotation: 0;
              transform-origin: top;
              width: 42vmin;
              height: 42vmin;
              background-color: ;
              position: absolute;
              bottom: 8vmin;
              left: 29vmin;
              right: 29vmin;
              --letnizasuk: calc(var(--rotation) * 1deg);
              transform: rotate(var(--letnizasuk));
              text-align: center;
            }
            .urnastevilcnica {
              width: 37vmin;
              height: 37vmin;
              position: absolute;
              bottom: 0;
              left: 2.5vmin;
              right: 2.5vmin;
              z-index: 80;
            }
            .letnikazalec {
              width: 1px;
              height: 50vmin;
              background-color: White;
              position: absolute;
              left: 50%;
            }

            *, *::after, *::before {
              box-sizing: border-box;
              font-family: Times New Roman, serif;
            }

            .clock {
              width: 37vmin;
              height: 37vmin;
              left: 2.5vmin;
              right: 2.5vmin;
              background-color: #121212;
              border-radius: 50%;
              border: 1.5px solid White;
              position: absolute; /*nadrejen položaj glede na številke*/
              bottom: 0;
            }

            .clock .hand {
              --rotation: 0;
              position: absolute;
              bottom: 50%;
              left: 50%;
              border: 1px solid #121212;
              border-bottom-left-radius: 10px;
              border-bottom-right-radius: 10px;
              transform-origin: top; /*izvor preoblikovanja, za nas sukanja*/
              z-index: 10; /*visoka plast, večja od številke, da prekrije številko*/
              transform: translateX(-50%) translateY(100%)/*kazalec prestavimo za polovico v levo, da je poravnan s sredino številk in celega dol, da je zamaknjen za 180°*/ rotate(calc(var(--rotation) * 1deg));
            }

            .clock::after /*krogec na sredini*/{
              content: ''; /*da lahko ustvarimo nov element*/
              position: absolute;
              background-color: White;
              z-index: 11; /*visoka plast, da prekrije kazalce*/
              width: 5%;
              height: 5%;
              top: 50%;
              left: 50%;
              transform: translate(-50%, -50%); /*postavimo središče elemnta (ne pa kot) v središče polja*/
              border-radius: 50%; /*krog iz kvadrata*/
            }

            .clock .hand.second {
              width: 3px;
              height: 45%;
              background-color: Lime; /*barva kazalca*/
            }

            .clock .hand.minute {
              width: 5px;
              height: 44%;
              background-color: White; /*barva kazalca*/
            }

            .clock .hand.hour {
              width: 4%;
              height: 44%;
              background-color: none; /*barva kazalca*/
              border: 2px solid White;
            }
        </style>
        <script>
            setInterval(setClock, 1000)/* s setInterval vsako sekundo (1000 milisekund) kličemo funkcijo setClock*/

            const hourHand = document.querySelector('[data-hour-hand]') /*izbere vrstico, ki ima atribut data-hour-hand*/
            const minuteHand = document.querySelector('[data-minute-hand]') /*izbere vrstico, ki ima atribut data-minute-hand*/
            const secondHand = document.querySelector('[data-second-hand]') /*izbere vrstico, ki ima atribut data-second-hand*/
            const dnevnaura = document.querySelector('[data-dnevnaura]')

            Date.prototype.getDayOfYear = function() {
                          const startOfYear = new Date(this.getFullYear(), 0, 0);
                          const diff = this - startOfYear;
                          const oneDay = 1000 * 60 * 60 * 24;
                          return Math.floor(diff / oneDay);
            };

            function isLeapYear(year) {
                         return (year % 4 === 0 && year % 100 !== 0) || (year % 400 === 0);
            }

            function setClock() /*funkcija seClock, ki se kliče zgoraj ima tu svoje korake:*/ {

                     
                          const currentDate = new Date() /*ustvari element Date, ki predstavlja trenutni datum in čas*/
                          const secondsRatio = currentDate.getSeconds() / 60 /*Izračuna razmerje sekundnega kazalca (v obliki razmerja sekund od 0 do 59)*/
                          const minutesRatio = (secondsRatio + currentDate.getMinutes()) / 60 /*Izračuna razmerje minutnega kazalca (v obliki razmerja minut od 0 do 59 + sekundno razmerje)*/
                          const hoursRatio = (minutesRatio + currentDate.getHours()) / 24 /*Izračuna razmerje urnega kazalca (v obliki razmerja ur od 0 do 23 + minutno razmerje)*/

                          const totalDaysInYear = isLeapYear(currentDate.getFullYear()) ? 366 : 365; // Poglejte, ali je trenutno leto prestopno
                          const daysRatio = (currentDate.getDayOfYear() + hoursRatio) / totalDaysInYear;

                          setRotation(secondHand, secondsRatio) /*Kliče funkcijo setRotation za kazalec secondHand, da posodobi njegove rotacije na osnovi izračunanih razmerij*/
                          setRotation(minuteHand, minutesRatio) /*Kliče funkcijo setRotation za kazalec minuteHand, da posodobi njegove rotacije na osnovi izračunanih razmerij*/
                          setRotation(hourHand, hoursRatio) /*Kliče funkcijo setRotation za kazalec hourHand, da posodobi njegove rotacije na osnovi izračunanih razmerij*/
                          setRotation(dnevnaura, daysRatio)
            }

            function setRotation(element, rotationRatio) /*funkcija, ki posodablja rotacijo določenega elementa (kazalca)*/ {
                            element.style.setProperty ('--rotation', rotationRatio * -360)
            } /*V tem primeru se uporablja CSS spremenljivka --rotation, ki določa stopnjo rotacije elementa. Spremenljivka rotationRatio je razmerje, ki ga prejme funkcija setClock za vsak kazalec. Ta razmerja so pomnožena z -360, ker se CSS rotacija izvaja v stopinjah, negativna vrednost pa pomeni sukanje v nasprotni smeri urinega kazalca*/


            setClock() /*kliče funkcijo setClock takoj po nalaganju strani, da se zagotovi, da se ure in kazalci pravilno nastavijo na začetku*/
        </script>
</html>
