    <head>
        <meta charset="utf-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Moj časovnik</title>
          <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
        <link href="styles.css" rel="stylesheet">
        <script src="scripts.js"></script>
        <link rel="icon" type="image/svg+xml" href="JPZ.svg">
    </head>
<body>
    <div class="content">
    <h2>Star sem:</h2>
        <p>
            <time id="resultMinute">število</time> minut<br>
            oz. <time id="resultUre">število</time> ur<br>
            oz. <time id="resultDnevi">število</time> dni<br>
            oz. <time id="resultLeta">število</time> tropskih let (glede na letne čase)
        </p>
        <hr>
        <p>oz. <time id="resultLDUM">LL:DD:UU:MM</time><br>
            oz. <time id="resultDUM">DD:UU:MM</time><br>
            oz. <time id="resultUM">UU:MM</time><br>
        </p>
        <hr>
        <p>število prestopnih let od rojstva: <i id="resultPL">število</i></p>
    </div>

  <script>
    const targetDate = Date.UTC(2006, 6, 25, 10, 40);
    const resultElementMinute = document.getElementById('resultMinute');
    const resultElementUre = document.getElementById('resultUre');
    const resultElementDnevi = document.getElementById('resultDnevi');
    const resultElementLeta = document.getElementById('resultLeta');
    const resultElementLDUM = document.getElementById('resultLDUM');
    const resultElementDUM = document.getElementById('resultDUM');
    const resultElementUM = document.getElementById('resultUM');
    const resultElementPL = document.getElementById('resultPL');

    function countLeapYears(startYear, endYear) {
      let leapYearCount = 0;

      for (let year = startYear; year <= endYear; year++) {
        if ((year % 4 === 0 && year % 100 !== 0) || year % 400 === 0) {
          leapYearCount++;
        }
      }

      return leapYearCount;
    }

    const targetYear = 2006;
    const currentTimeLocal = Date.now();
    const timezoneOffset = new Date().getTimezoneOffset();
    const currentTimeUTC = currentTimeLocal - timezoneOffset * 1000 * 60;
    const currentYear = new Date(currentTimeUTC).getFullYear();
    const leapYearsCount = countLeapYears(targetYear, currentYear);

    function updateDifference() {
        const currentTimeLocal = Date.now();
        const timezoneOffset = new Date().getTimezoneOffset();
        const currentTimeUTC = currentTimeLocal - timezoneOffset * 1000 * 60;

        const currentTime = currentTimeUTC;
        const timeDifference = Math.floor(((targetDate - currentTime)*(-1))/(1000*60));

        const leta = (((targetDate - currentTime)*(-1))/(1000*60*60*24*365.2422)).toFixed(3)
        const dnevi = (((targetDate - currentTime)*(-1))/(1000*60*60*24)).toFixed(3)
        const ure = (((targetDate - currentTime)*(-1))/(1000*60*60)).toFixed(2)
        const minute = timeDifference

        const dbpl = Math.floor(dnevi)-(leapYearsCount*366) /*dnevi brez dni prestopnih let*/
        const npl = dbpl/365 /*neprestopna leta*/
        const nplc = Math.floor(npl)
        const lc = leapYearsCount + nplc
            const ld = dnevi - leapYearsCount*366 - nplc*365
            const ldc = Math.floor(ld)
            const ldu = (ld - ldc)*24
            const lduc = Math.floor(ldu)
            const ldum = (ldu - lduc)*60
            const ldumc = Math.floor(ldum)

        const dc = Math.floor(dnevi)
        const du = (timeDifference - dc*(24*60))/(60)
        const duc = Math.floor(du)
        const dum = (du - duc)*60
        const dumc = Math.floor(dum)

        const uc = Math.floor(ure)
        const um = timeDifference - uc*60
        const umc = Math.floor(um)

        resultElementMinute.textContent = `${minute}`;
        resultElementUre.textContent = `${ure}`;
        resultElementDnevi.textContent = `${dnevi}`;
        resultElementLeta.textContent = `${leta}`;

        resultElementLDUM.textContent = `${lc} let, ${ldc} dni, ${lduc} ur in ${ldumc} minut`;
        resultElementDUM.textContent = `${dc} dni, ${duc} ur in ${dumc} minut`;
        resultElementUM.textContent = `${uc} ur in ${umc} minut`;
        resultElementPL.textContent = `${leapYearsCount}`;
    }

    setInterval(updateDifference,  1000); /*funkcije se posodobljajo/izvršujejo na vsako sekundo (1000milisekund)*/
  </script>
</body>
</html>
