 <p class="center-text">Star sem:</p>

        <div class="row" id="yearsRow">Število let, dni, ur in minut</div>
        <div class="row" id="daysRow">Število dni, ur in minut</div>

    <script>
function addThousandSeparators(number) {
    return number.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
}

function updateTimer() {
    // Set the start date and time to 25. 7. 2006 at 10:40
    let startDate = new Date(Date.UTC(2006, 6, 25, 10, 40));

    // Calculate elapsed seconds
    let elapsedSeconds = Math.floor((Date.now() - startDate) / 1000);

    // Calculate elapsed years (including leap years)
    let elapsedYears = Math.floor((elapsedSeconds / (60 * 60 * 24 * 365))+leapYears*(60 * 60 * 24));

    // Calculate remaining seconds after elapsed years
    let remainingSeconds = elapsedSeconds - (elapsedYears * 365.25 * 24 * 60 * 60);

    // Calculate days, hours, and minutes from remaining seconds
    let days = Math.floor(remainingSeconds / (60 * 60 * 24));
    let hours = Math.floor((remainingSeconds % (60 * 60 * 24)) / (60 * 60));
    let minutes = Math.floor((remainingSeconds % (60 * 60)) / 60);

    document.getElementById("yearsRow").innerText = `Star sem: ${addThousandSeparators(elapsedYears)} let, ${addThousandSeparators(days)} dni, ${addThousandSeparators(hours)} ur in ${addThousandSeparators(minutes)} minut`;
    document.getElementById("daysRow").innerText = `Oz.: ${addThousandSeparators(days+elapsedYears/365.24)} dni, ${addThousandSeparators(hours)} ur in ${addThousandSeparators(minutes)} minut`;
    document.getElementById("hoursRow").innerText = `Oz.: ${addThousandSeparators(hours)} ur in ${addThousandSeparators(minutes)} minut`;
    document.getElementById("minutesRow").innerText = `Oz.: ${addThousandSeparators(elapsedSeconds / 60)} minut`;
}

setInterval(updateTimer, 1000);
updateTimer(); // Initialize the timer immediately
